
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Bay Resort</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#f4f4f4;color:#333;scroll-behavior:smooth;}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 18px;
background:rgba(0,0,0,0.9);
color:white;
z-index:999;
}

.logo{font-weight:600;font-size:18px;}

.nav-links{
display:flex;
gap:16px;
font-size:14px;
}

.nav-links a{
color:white;
text-decoration:none;
opacity:0.9;
}

.nav-links a:hover{opacity:1;}

.nav-btn a{
background:#d4af37;
padding:8px 16px;
border-radius:25px;
color:black;
text-decoration:none;
font-size:14px;
font-weight:500;
}

/* HERO SLIDESHOW */

.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
}

.slide{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:opacity 1s;
}

.slide.active{opacity:1;}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.hero-content{
position:relative;
z-index:2;
max-width:650px;
}

.hero h1{font-size:44px;margin-bottom:10px;}
.hero p{font-size:18px;margin-bottom:25px;}

.hero button{
padding:14px 32px;
background:#d4af37;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

/* SECTIONS */

section{padding:80px 8%;}

h2{text-align:center;margin-bottom:40px;font-size:30px;}

/* ROOMS */

.rooms{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.room{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
cursor:pointer;
}

.room img{width:100%;height:170px;object-fit:cover;}
.room-content{padding:16px;}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

.gallery img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

/* BOOKING MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
z-index:2000;
}

.modal-box{
background:white;
padding:24px;
border-radius:10px;
width:320px;
}

.modal-box input,.modal-box textarea{
width:100%;
padding:10px;
margin:6px 0;
}

.modal-box button{
margin-top:8px;
width:100%;
padding:10px;
border:none;
border-radius:20px;
cursor:pointer;
}

.email{background:#d4af37;}
.whatsapp{background:#25D366;color:white;}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<nav>

<div class="logo">Azure Bay</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#rooms">Rooms</a>
<a href="#gallery">Gallery</a>
</div>

<div class="nav-btn">
<a href="#rooms">See Rooms</a>
</div>

</nav>

<section class="hero">

<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb');"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1520250497591-112f2f40a3f4');"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85');"></div>

<div class="overlay"></div>

<div class="hero-content">
<h1>Azure Bay Resort</h1>
<p>Luxury Escape By The Ocean</p>
<a href="#rooms"><button>See Rooms</button></a>
</div>

</section>

<section id="rooms">

<h2>Our Rooms</h2>

<div class="rooms">

<div class="room" onclick="openBooking('Ocean Suite')">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<div class="room-content">
<h3>Ocean Suite</h3>
<p>$220 / night</p>
</div>
</div>

<div class="room" onclick="openBooking('Deluxe Room')">
<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
<div class="room-content">
<h3>Deluxe Room</h3>
<p>$180 / night</p>
</div>
</div>

<div class="room" onclick="openBooking('Presidential Villa')">
<img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4">
<div class="room-content">
<h3>Presidential Villa</h3>
<p>$450 / night</p>
</div>
</div>

</div>

</section>

<section id="gallery">

<h2>Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
<img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">
<img src="https://images.unsplash.com/photo-1571896349842-33c89424de2d">
<img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4">

</div>

</section>

<footer>
© 2026 Azure Bay Resort
</footer>

<div class="modal" id="bookingModal">

<div class="modal-box">

<h3 id="roomTitle">Book Room</h3>

<input id="name" placeholder="Your Name">
<input id="guests" placeholder="Guests">
<input id="dates" placeholder="Dates">

<button class="email" onclick="sendEmail()">Send Email</button>
<button class="whatsapp" onclick="sendWhatsApp()">WhatsApp</button>

</div>

</div>

<script>

/* HERO SLIDESHOW */

let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{

slides[index].classList.remove("active");

index=(index+1)%slides.length;

slides[index].classList.add("active");

},4000);

/* BOOKING */

let selectedRoom="";

function openBooking(room){

selectedRoom=room;

document.getElementById("roomTitle").innerText="Book "+room;

document.getElementById("bookingModal").style.display="flex";

}

function buildMessage(){

let name=document.getElementById("name").value;
let guests=document.getElementById("guests").value;
let dates=document.getElementById("dates").value;

return "Booking Request:%0A"+"Room: "+selectedRoom+"%0AName:"+name+"%0AGuests:"+guests+"%0ADates:"+dates;

}

function sendEmail(){

window.location.href="mailto:hotel@email.com?subject=Room Booking&body="+buildMessage();

}

function sendWhatsApp(){

window.open("https://wa.me/1234567890?text="+buildMessage());

}

window.onclick=function(e){

let modal=document.getElementById("bookingModal");

if(e.target==modal) modal.style.display="none";

}

</script>

</body>
</html>
